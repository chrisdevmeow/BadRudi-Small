name: Train Bad Rudi
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install torch transformers peft bitsandbytes datasets requests beautifulsoup4
      - run: python bad_rudi.py
      - uses: actions/upload-artifact@v4
        with:
          name: bad-rudi-lora
          path: model/
